<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoTA</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.9.3/min/dropzone.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.9.3/min/dropzone.min.js"></script>
  </head>
  <body>
    <h1 style="text-align: center">AutoTA</h1>
    <form action="/upload" class="dropzone" id="imageDropzone"></form>
    <div
      id="outputText"
      style="margin-top: 20px; font-family: monospace; white-space: pre-wrap"
    ></div>

    <script>
      Dropzone.options.imageDropzone = {
        paramName: "images[]",
        maxFilesize: 5, // MB
        acceptedFiles: "image/*",
        success: function (file, response) {
          console.log("Response from server:", response); // Debugging: Log the response

          // Check if the response contains the 'output' key
          if (response.output) {
            const outputDiv = document.getElementById("outputText");

            // Append the new proof text to the existing content
            const existingContent = outputDiv.textContent.trim();
            const newContent = response.output.trim();

            // Combine existing and new content with a line break
            outputDiv.textContent = existingContent
              ? existingContent + "\n\n" + newContent
              : newContent;
          } else {
            const outputDiv = document.getElementById("outputText");
            outputDiv.textContent +=
              "No proof generated for one of the uploads.\n";
          }
        },
        error: function (file, response) {
          console.error("Error from server:", response);
          const outputDiv = document.getElementById("outputText");
          outputDiv.textContent +=
            "An error occurred while processing one of the uploads.\n";
        },
      };
    </script>
  </body>
</html>
